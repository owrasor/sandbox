# Política HTTP: redirecionar tudo para HTTPS (alinhado com spec.md — MVP HTTPS).
# Upstream: serviço `dev` na rede sandbox (Vite típico na 5173).

server {
    listen 80;
    server_name example-app.test;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example-app.test;

    # DNS embutido do Docker — permite `angie -t` sem resolver `dev` no arranque.
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/angie/certs/example-app.test.pem;
    ssl_certificate_key /etc/angie/certs/example-app.test-key.pem;

    location / {
        set $upstream_dev http://dev:5173;
        proxy_pass $upstream_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
