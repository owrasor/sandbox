services:
  dev:
    build:
      context: ./docker
      dockerfile: Dockerfile
      additional_contexts:
        dotfiles: ${DOTFILES_HOST:?Defina DOTFILES_HOST no .env}
      args:
        DOTFILES_BOOTSTRAP_SCRIPT: ${DOTFILES_BOOTSTRAP_SCRIPT:-}
    container_name: sandbox-dev
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      USER_ID: ${USER_ID}
      GROUP_ID: ${GROUP_ID}
      TERM: ${TERM:-xterm-256color}
    volumes:
      - ${WORKSPACE_HOST:-./workspace}:/home/dev/workspace
      - ${DOTFILES_HOST:?Defina DOTFILES_HOST no .env}:/home/dev/dotfiles
      - ${SSH_DIR:?Defina SSH_DIR no .env}:/home/dev/.ssh:ro
    ports:
      - "3000:3000"
      - "8080:8080"
      - "5173:5173"
    working_dir: /home/dev
    networks:
      - sandbox

  angie:
    image: docker.angie.software/angie:1.11.4
    container_name: sandbox-angie
    depends_on:
      - dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/angie/angie.conf:/etc/angie/angie.conf:ro
      - ./docker/angie/sites:/etc/angie/sites:ro
      - ${ANGIE_CERTS_HOST:-./docker/angie/certs}:/etc/angie/certs:ro
    networks:
      - sandbox

  ngrok:
    image: ngrok/ngrok:latest
    container_name: sandbox-ngrok
    profiles:
      - public
    depends_on:
      - dev
    environment:
      # Obrigatório na prática ao usar `docker compose --profile public up` (ver docs/sandbox.md).
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command:
      - http
      - ${NGROK_TUNNEL_TARGET:-dev:3000}
    networks:
      - sandbox

networks:
  sandbox:
    driver: bridge
